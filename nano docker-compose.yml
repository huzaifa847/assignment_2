services:
  mongo:
    image: mongo:7
    container_name: quiz1_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  web:
    build: .
    container_name: quiz1_web
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    env_file:
      - .env

volumes:
  mongo_data:
