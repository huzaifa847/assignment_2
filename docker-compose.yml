version: '3.8'
services:
  attendance-app-jenkins:
    image: node:20-alpine
    container_name: attendance_web_jenkins
    ports:
      - "3000:3000"
    volumes:
      - /var/lib/jenkins/workspace/Attendance:/app
    working_dir: /app
    # The --host 0.0.0.0 is crucial for Vite/Next.js apps
    command: sh -c "npm install && (npm run dev -- --host 0.0.0.0 || npm start || node server.js)"
    environment:
      - MONGODB_URI=mongodb://db-jenkins:27017/student-attendance
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - db-jenkins

  db-jenkins:
    image: mongo:latest
    container_name: attendance_db_jenkins
    ports:
      - "27018:27017"
    volumes:
      - mongo-data-jenkins:/data/db

volumes:
  mongo-data-jenkins:
